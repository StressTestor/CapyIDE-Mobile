name: Build Debug APK

on:
  push:
    branches: [ "main", "dev" ]
    paths-ignore:
      - '**.md'
      - 'LICENSE*'
      - 'README*'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Run lint, unit tests, and build
      run: ./gradlew lint test assembleDebug
      
    - name: Get branch name and short SHA
      id: vars
      run: |
        echo "branch_name=$(echo ${GITHUB_REF#refs/heads/} | sed 's/\//-/g')" >> $GITHUB_OUTPUT
        echo "short_sha=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT
        
    - name: Create artifacts directory
      run: mkdir -p artifacts
      
    - name: Find and copy APK
      run: |
        find app/build/outputs/apk/debug -name "*.apk" -exec cp {} artifacts/CapyIDE-Mobile-${{ steps.vars.outputs.branch_name }}-${{ steps.vars.outputs.short_sha }}.apk \;
        
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: CapyIDE-Mobile-${{ steps.vars.outputs.branch_name }}-${{ steps.vars.outputs.short_sha }}
        path: artifacts/*.apk
        retention-days: 7
